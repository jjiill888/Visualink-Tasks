{{define "im_notif_view.html"}}
<div class="im-channel-root im-notif-root">
  <div class="im-channel-header">
    <div class="im-channel-header-inner">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="#4f46e5"><path d="M8 1a5 5 0 0 0-5 5v1.5l-1.3 2.2A1 1 0 0 0 2.6 11H5a3 3 0 0 0 6 0h2.4a1 1 0 0 0 .9-1.3L13 7.5V6a5 5 0 0 0-5-5zm0 12a1 1 0 0 1-1-1h2a1 1 0 0 1-1 1z"/></svg>
      <div>
        <div class="im-channel-title">系统通知</div>
        <div class="im-channel-desc">功能状态更新与 @提及</div>
      </div>
    </div>
  </div>

  <div class="im-notif-body">
    {{if .Notifications}}
      {{range .Notifications}}
      <div class="im-notif-item{{if not .IsRead}} unread{{end}}">
        <div class="im-notif-meta">
          <span class="im-notif-from">@{{.FromUser}}</span>
          <span class="im-notif-time">{{.CreatedAtLocal}}</span>
        </div>
        <div class="im-notif-text">{{.PreviewText}}</div>
        {{if .FeatureID}}
        <div class="im-notif-action">
          <a href="/dashboard" class="us-btn us-btn-outline us-btn-sm"
             onclick="window.opener && window.opener.location.reload(); return true;">
            查看功能
          </a>
        </div>
        {{end}}
      </div>
      {{end}}
    {{else}}
      <div class="im-notif-empty">暂无系统通知</div>
    {{end}}
  </div>

  <!-- 占位，保持布局一致 -->
  <div></div>
</div>
{{end}}
