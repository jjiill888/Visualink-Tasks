{{define "features_partial.html"}}
{{if .Features}}
  {{range .Features}}{{template "feature_row.html" .}}{{end}}
  {{if .HasMore}}
  <div class="us-load-more"
    hx-get="/features?page={{.NextPage}}"
    hx-include="#feature-search-form"
    hx-trigger="revealed"
    hx-swap="outerHTML"
    data-loading-class="us-htmx-loading"
    style="text-align:center;padding:16px">
    <span style="font-size:13px;color:#71767a">加载更多…</span>
  </div>
  {{end}}
{{else}}
  <div class="us-empty">
    <div class="us-empty-title">没有符合条件的功能</div>
    <p style="font-size:13px;color:#71767a">尝试调整筛选条件</p>
  </div>
{{end}}
{{end}}
