services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data        # SQLite 持久化，备份只需备份这个目录
    environment:
      - DB_PATH=/app/data/app.db
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3
